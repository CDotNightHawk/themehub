services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: themehub
      POSTGRES_PASSWORD: themehub
      POSTGRES_DB: themehub
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U themehub"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: themehub
      MINIO_ROOT_PASSWORD: themehubthemehub
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  web:
    build: ./web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://themehub:themehub@postgres:5432/themehub
      AUTH_SECRET: ${AUTH_SECRET:-please-change-me-please-change-me-please-change}
      AUTH_URL: ${PUBLIC_URL:-http://localhost:3000}
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost:3000}
      STORAGE_DRIVER: s3
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: themehub
      S3_ACCESS_KEY_ID: themehub
      S3_SECRET_ACCESS_KEY: themehubthemehub
      S3_FORCE_PATH_STYLE: "true"
      SITE_NAME: ${SITE_NAME:-themehub}
      SITE_TAGLINE: ${SITE_TAGLINE:-Theme everything.}
      ADMIN_USERS: ${ADMIN_USERS:-}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  minio-data:

[colors]
bg       = #1a1720
fg       = #f5e9f5
accent   = #ff4fb2
accent2  = #b24dff
muted    = #5b4d66

[bar/paw]
width = 100%
height = 32
background = ${colors.bg}
foreground = ${colors.fg}
line-color = ${colors.accent}
line-size  = 2
font-0 = Iosevka:size=11
modules-left   = workspaces title
modules-center = date
modules-right  = cpu mem battery

[module/workspaces]
type = internal/bspwm
format-active-background = ${colors.accent}
format-active-foreground = ${colors.bg}

[module/date]
type = internal/date
date = %a %d
time = %H:%M
format-foreground = ${colors.accent2}

[module/cpu]
type = internal/cpu
format = 🐾 %percentage%%

[module/mem]
type = internal/memory
format = ram %percentage_used%%

[module/battery]
type = internal/battery
full-at = 98

# Paw Hyprland — dark + neon-magenta
# Source this from your main hyprland.conf:
#   source = ~/.config/hypr/themes/paw-hyprland/hyprland.conf

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ff4fb2ee) rgba(b24dffee) 45deg
    col.inactive_border = rgba(1a1720aa)
    layout = dwindle
}

decoration {
    rounding = 12
    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }
    drop_shadow = true
    shadow_range = 18
    shadow_render_power = 3
    col.shadow = rgba(ff4fb255)
}

animations {
    enabled = true
    bezier = pawCurve, 0.22, 1, 0.36, 1
    animation = windows, 1, 5, pawCurve
    animation = fade, 1, 4, default
    animation = workspaces, 1, 6, pawCurve, slide
    animation = border, 1, 8, default
}
